[package]
name = "varda"
version = "0.1.0"
edition = "2021"
authors = ["Varda Contributors"]
description = "Linux and MacOS native VJ software with ISF/GLSL shader support"
license = "MIT"

[lib]
name = "varda"
path = "src/lib.rs"

[dependencies]
# Graphics
wgpu = "27.0"
winit = "0.30"
bytemuck = { version = "1.25", features = ["derive"] }

# Shader compilation
shaderc = "0.10"
naga = { version = "27.0", features = ["spv-in", "wgsl-out"] }

# ISF metadata parsing
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# UI
egui = "0.33"
egui-wgpu = "0.33"
egui-winit = { version = "0.33", features = ["accesskit"] }

# File system
notify = "8.2"
walkdir = "2.5"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
env_logger = "0.11"
log = "0.4"

# Async runtime
pollster = "0.4"
cpal = "0.17.3"
rustfft = "6.4.1"
crossbeam-channel = "0.5.15"
ffmpeg-next = "8.0.0"
rosc = "0.11.4"
image = "0.25.10"
rfd = "0.17.2"
snap = "1.1.1"
nokhwa = { version = "0.10.10", features = ["input-native", "output-threaded"] }
midir = "0.11"
yuvutils-rs = "0.8.3"
geo = "0.33.1"
toml = "1.1.2"

[features]
test-fixtures = []

[dev-dependencies]
egui_kittest = { version = "0.33.3", features = ["wgpu", "snapshot"] }
varda = { path = ".", features = ["test-fixtures"] }
