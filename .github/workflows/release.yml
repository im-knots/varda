name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Verify tag is on main
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check tag commit is on main
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/main'; then
            echo "::error::Tag does not point to a commit on main. Aborting release."
            exit 1
          fi

  build-linux:
    name: Linux (test + AppImage)
    needs: [preflight]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev \
            libsrt-gnutls-dev \
            libasound2-dev \
            libv4l-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib

      - name: Build Linux AppImage
        run: ./scripts/ci/build-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-appimage
          path: Varda-x86_64.AppImage

  build-macos:
    name: macOS Universal DMG
    needs: [preflight]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # --- arm64 (native) ---
      - name: Install arm64 dependencies
        run: |
          brew tap homebrew-ffmpeg/ffmpeg
          brew install homebrew-ffmpeg/ffmpeg/ffmpeg --with-srt
          brew install cmake pkg-config create-dmg

      - name: Build arm64 .app
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ./scripts/ci/build-macos.sh --native-only --skip-deps --tag "$TAG"
          mv Varda.app arm64-app

      # --- x86_64 (cross-compile via Rosetta Homebrew) ---
      - name: Install x86_64 Homebrew
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

      - name: Install x86_64 FFmpeg
        run: |
          arch -x86_64 /usr/local/bin/brew tap homebrew-ffmpeg/ffmpeg
          arch -x86_64 /usr/local/bin/brew install homebrew-ffmpeg/ffmpeg/ffmpeg --with-srt
          arch -x86_64 /usr/local/bin/brew install cmake pkg-config

      - name: Build x86_64 .app
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ./scripts/ci/build-macos.sh --native-only --skip-deps --skip-build --tag "$TAG" \
            --lib-dir /usr/local/lib
          # Build the x86_64 binary separately with cross-compile env
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig \
          PKG_CONFIG_ALLOW_CROSS=1 \
          cargo build --release --target x86_64-apple-darwin
          # Replace the binary in the .app with the x86_64 one
          cp target/x86_64-apple-darwin/release/varda Varda.app/Contents/MacOS/varda
          mv Varda.app x86-app

      # --- Combine into universal DMG ---
      - name: Create universal DMG
        run: ./scripts/ci/combine-universal.sh arm64-app x86-app

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: Varda-macOS-universal.dmg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Varda ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            linux-appimage/Varda-x86_64.AppImage
            macos-dmg/Varda-macOS-universal.dmg
