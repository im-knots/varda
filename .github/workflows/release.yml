name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Verify tag is on main
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check tag commit is on main
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/main'; then
            echo "::error::Tag does not point to a commit on main. Aborting release."
            exit 1
          fi

  build-linux:
    name: Linux (test + portable tarball)
    needs: [preflight]
    # ubuntu-24.04 (glibc 2.39) required: ort's prebuilt ONNX Runtime
    # references __isoc23_* symbols which need glibc >= 2.38.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev \
            libsrt-gnutls-dev \
            libasound2-dev \
            libv4l-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install NDI SDK
        run: |
          cd /tmp
          curl -sL https://downloads.ndi.tv/SDK/NDI_SDK_Linux/Install_NDI_SDK_v6_Linux.tar.gz | tar xz
          echo Y | ./Install_NDI_SDK_v6_Linux.sh >/dev/null
          ls -la "/tmp/NDI SDK for Linux/lib/x86_64-linux-gnu/"libndi* || true

      - name: Run tests
        run: cargo test --lib

      - name: Build Linux portable tarball
        run: ./scripts/ci/build-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-tarball
          path: Varda-Linux-x86_64.tar.gz

  build-macos:
    name: macOS Universal DMG
    needs: [preflight]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # --- arm64 (native via Homebrew) ---
      - name: Install arm64 dependencies
        run: |
          brew tap homebrew-ffmpeg/ffmpeg
          brew install homebrew-ffmpeg/ffmpeg/ffmpeg --with-srt
          brew install cmake pkg-config create-dmg nasm
          brew install --cask libndi

      - name: Build arm64 .app
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ./scripts/ci/build-macos.sh --native-only --skip-deps --tag "$TAG"
          mv Varda.app arm64-app

      # --- x86_64 (cross-compile FFmpeg + Rust) ---
      - name: Build x86_64 FFmpeg from source
        run: ./scripts/ci/build-ffmpeg-x86_64.sh

      - name: Build x86_64 .app
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          # Build x86_64 Rust binary
          PKG_CONFIG_PATH=/tmp/ffmpeg-x86_64/lib/pkgconfig \
          PKG_CONFIG_ALLOW_CROSS=1 \
          cargo build --release --target x86_64-apple-darwin
          # Create .app with x86_64 FFmpeg dylibs
          ./scripts/ci/build-macos.sh --native-only --skip-deps --skip-build --tag "$TAG" \
            --target x86_64-apple-darwin --lib-dir /tmp/ffmpeg-x86_64/lib
          mv Varda.app x86-app

      # --- Combine into universal DMG ---
      - name: Create universal DMG
        run: ./scripts/ci/combine-universal.sh arm64-app x86-app

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: Varda-macOS-universal.dmg

  build-windows:
    name: Windows x64 (portable ZIP)
    needs: [preflight]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install vcpkg FFmpeg
        shell: pwsh
        run: |
          vcpkg install ffmpeg:x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-x64-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: vcpkg-windows-x64-

      - name: Install LLVM (for shaderc)
        run: choco install llvm -y
        shell: cmd

      - name: Set LLVM environment
        shell: pwsh
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: Install NDI Runtime
        shell: pwsh
        run: |
          $ndiUrl = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20Runtime.exe"
          $ndiInstaller = "$env:TEMP\ndi-runtime.exe"
          Invoke-WebRequest -Uri $ndiUrl -OutFile $ndiInstaller
          Start-Process -FilePath $ndiInstaller -ArgumentList "/verysilent" -Wait
          Write-Host "NDI Runtime installed"

      - name: Set FFmpeg pkg-config path
        shell: pwsh
        run: |
          echo "PKG_CONFIG_PATH=C:\vcpkg\installed\x64-windows\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: Build release binary
        shell: pwsh
        run: cargo build --release

      - name: Package portable ZIP
        shell: pwsh
        run: .\scripts\ci\build-windows.ps1 -SkipBuild

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: Varda-Windows-x64.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Varda ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            linux-tarball/Varda-Linux-x86_64.tar.gz
            macos-dmg/Varda-macOS-universal.dmg
            windows-zip/Varda-Windows-x64.zip
