name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Verify main + run tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check tag commit is on main
        run: |
          TAG_SHA=$(git rev-parse HEAD)
          if ! git branch -r --contains "$TAG_SHA" | grep -q 'origin/main'; then
            echo "::error::Tag does not point to a commit on main. Aborting release."
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev \
            libsrt-gnutls-dev \
            libasound2-dev \
            libv4l-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib

  build-linux:
    name: Linux AppImage
    needs: [preflight]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build Linux AppImage
        run: ./scripts/ci/build-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-appimage
          path: Varda-x86_64.AppImage

  build-macos-arm64:
    name: macOS (arm64)
    needs: [preflight]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build arm64 binary
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ./scripts/ci/build-macos.sh --native-only --tag "$TAG"

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm64-binary
          path: Varda.app

  build-macos-x86:
    name: macOS (x86_64)
    needs: [preflight]
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build x86_64 .app
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          ./scripts/ci/build-macos.sh --native-only --tag "$TAG"

      - name: Upload .app
        uses: actions/upload-artifact@v5
        with:
          name: macos-x86-app
          path: Varda.app

  build-macos-universal:
    name: macOS DMG (Universal)
    needs: [build-macos-arm64, build-macos-x86]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download arm64 .app
        uses: actions/download-artifact@v5
        with:
          name: macos-arm64-binary
          path: arm64-app

      - name: Download x86_64 .app
        uses: actions/download-artifact@v5
        with:
          name: macos-x86-app
          path: x86-app

      - name: Combine into universal DMG
        run: ./scripts/ci/combine-universal.sh arm64-app x86-app

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg
          path: Varda-macOS-universal.dmg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos-universal]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Varda ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            linux-appimage/Varda-x86_64.AppImage
            macos-dmg/Varda-macOS-universal.dmg
