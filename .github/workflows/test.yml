name: test

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test
    # ubuntu-24.04 (glibc 2.39) required: ort's prebuilt ONNX Runtime
    # references __isoc23_strtol / __isoc23_strtoull / __isoc23_strtoll
    # which only exist in glibc >= 2.38. ubuntu-22.04 (glibc 2.35) fails.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavdevice-dev \
            libsrt-gnutls-dev \
            libasound2-dev \
            libv4l-dev \
            libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev \
            libgtk-3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib
